name: Build & Upload Tile Escape iOS to App Store

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Extract iOS build package
        run: |
          tar -xzf tile-escape-ios-build.tar.gz
          mv ios-build tileescape-cap

      - name: Install Capacitor dependencies
        working-directory: tileescape-cap
        run: |
          npm install
          npm install @capacitor-community/admob@^6.0.0 --legacy-peer-deps
          echo "Installed packages:"
          ls node_modules/@capacitor/ 2>/dev/null || true
          ls node_modules/@capacitor-community/ 2>/dev/null || true

      - name: Add iOS platform
        working-directory: tileescape-cap
        run: npx cap add ios

      - name: Replace placeholder splash screen with branded dark LaunchScreen
        run: |
          LAUNCH="tileescape-cap/ios/App/App/LaunchScreen.storyboard"
          cat > "$LAUNCH" << 'STORYBOARD_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <document type="com.apple.InterfaceBuilder3.CocoaTouch.Storyboard.XIB" version="3.0" toolsVersion="23504" targetRuntime="AppleCocoa Touch" propertyAccessControl="none" useAutolayout="YES" launchScreen="YES" useTraitCollections="YES" useSafeAreas="YES" colorMatched="YES" initialViewController="01J-lp-oVM">
              <device id="retina6_12" orientation="portrait" appearance="light"/>
              <dependencies>
                  <deployment identifier="iOS"/>
                  <plugIn identifier="com.apple.InterfaceBuilder.IBCocoaTouchPlugin" version="23504"/>
                  <capability name="Safe area layout guides" minToolsVersion="9.0"/>
                  <capability name="documents saved in the Xcode 8 format" minToolsVersion="8.0"/>
              </dependencies>
              <scenes>
                  <scene sceneID="EHf-IW-A2E">
                      <objects>
                          <viewController id="01J-lp-oVM" sceneMemberID="viewController">
                              <view key="view" contentMode="scaleToFill" id="Ze5-6b-2t3">
                                  <rect key="frame" x="0.0" y="0.0" width="393" height="852"/>
                                  <autoresizingMask key="autoresizingMask" widthSizable="YES" heightSizable="YES"/>
                                  <viewLayoutGuide key="safeAreaLayoutGuide" id="Bcu-3y-fUS"/>
                                  <color key="backgroundColor" red="0.039215686" green="0.039215686" blue="0.10196078" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                              </view>
                          </viewController>
                          <placeholder placeholderIdentifier="IBFirstResponder" id="iYj-Kq-Ea1" userLabel="First Responder" sceneMemberID="firstResponder"/>
                      </objects>
                      <point key="canvasLocation" x="53" y="375"/>
                  </scene>
              </scenes>
          </document>
          STORYBOARD_EOF

      - name: Inject game files into Capacitor webDir
        run: |
          if [ -f "tileescape-cap/capacitor.config.json" ]; then
            WEB_DIR=$(node -e "const c=require('./tileescape-cap/capacitor.config.json'); console.log(c.webDir||'www');")
          else
            WEB_DIR="www"
          fi
          mkdir -p "tileescape-cap/$WEB_DIR/assets"
          cp index.html       "tileescape-cap/$WEB_DIR/" && echo "Copied: index.html"     || echo "MISSING: index.html"
          cp manifest.json    "tileescape-cap/$WEB_DIR/" 2>/dev/null || true
          cp favicon.png      "tileescape-cap/$WEB_DIR/" 2>/dev/null || true
          cp icon-1024.png    "tileescape-cap/$WEB_DIR/" 2>/dev/null || true
          cp admob-init.js    "tileescape-cap/$WEB_DIR/" && echo "Copied: admob-init.js"  || echo "MISSING: admob-init.js"
          cp assets/*.js      "tileescape-cap/$WEB_DIR/assets/" && echo "Copied: assets/*.js"  || echo "MISSING: assets/js"
          cp assets/*.css     "tileescape-cap/$WEB_DIR/assets/" && echo "Copied: assets/*.css" || echo "MISSING: assets/css"
          ls -la "tileescape-cap/$WEB_DIR/"

      - name: Sync web files
        working-directory: tileescape-cap
        run: npx cap sync ios

      - name: Verify and overwrite game files in iOS native public folder
        run: |
          IOS_PUBLIC=$(find tileescape-cap/ios -name "index.html" -not -path "*/node_modules/*" 2>/dev/null | head -1 | xargs dirname 2>/dev/null)
          if [ -n "$IOS_PUBLIC" ]; then
            mkdir -p "$IOS_PUBLIC/assets"
            cp index.html    "$IOS_PUBLIC/" && echo "Overwrote: index.html" || echo "FAILED: index.html"
            cp manifest.json "$IOS_PUBLIC/" 2>/dev/null || true
            cp favicon.png   "$IOS_PUBLIC/" 2>/dev/null || true
            cp icon-1024.png "$IOS_PUBLIC/" 2>/dev/null || true
            cp assets/*.js   "$IOS_PUBLIC/assets/" && echo "Overwrote: assets/js"  || echo "FAILED: assets/js"
            cp assets/*.css  "$IOS_PUBLIC/assets/" && echo "Overwrote: assets/css" || echo "FAILED: assets/css"
          else
            echo "ERROR: Could not find iOS public folder!"
          fi

      - name: Replace iOS App Icons with Tile Escape Icon
        run: |
          SOURCE="$GITHUB_WORKSPACE/icons/icon-512.png"
          ICONSET="tileescape-cap/ios/App/App/Assets.xcassets/AppIcon.appiconset"
          SOURCE_1024="/tmp/icon-1024.png"
          sips -z 1024 1024 "$GITHUB_WORKSPACE/icons/icon-1024.png" --out "$SOURCE_1024"
          for f in "$ICONSET"/*.png; do
            size=$(sips -g pixelWidth "$f" 2>/dev/null | tail -n1 | awk '{print $2}')
            if [ -n "$size" ] && [ "$size" -gt 0 ]; then
              if [ "$size" -ge 512 ]; then
                sips -z "$size" "$size" "$SOURCE_1024" --out "$f"
              else
                sips -z "$size" "$size" "$SOURCE" --out "$f"
              fi
            fi
          done
          echo "All icons replaced successfully"

      - name: Patch Podfile for code signing
        working-directory: tileescape-cap/ios/App
        run: |
          python3 - <<'PYEOF'
          content = open('Podfile', 'r').read()
          inject = (
            "\n  installer.pods_project.targets.each do |target|\n"
            "    target.build_configurations.each do |config|\n"
            "      config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'\n"
            "      config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'\n"
            "      config.build_settings['EXPANDED_CODE_SIGN_IDENTITY'] = ''\n"
            "    end\n"
            "  end\n"
          )
          if 'post_install do |installer|' in content:
            content = content.replace('post_install do |installer|', 'post_install do |installer|' + inject)
          else:
            content += '\npost_install do |installer|' + inject + 'end\n'
          open('Podfile', 'w').write(content)
          print("Podfile patched successfully")
          PYEOF

      - name: Install CocoaPods
        working-directory: tileescape-cap/ios/App
        run: pod install

      - name: Import Distribution Certificate
        run: |
          echo "${{ secrets.DISTRIBUTION_CERTIFICATE_P12 }}" | tr -d '[:space:]' | base64 --decode > distribution.p12
          echo "P12 file size: $(wc -c < distribution.p12) bytes"
          security create-keychain -p "temp_password" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temp_password" build.keychain
          security import distribution.p12 -k build.keychain -P "${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "temp_password" build.keychain
          security list-keychain -d user -s build.keychain login.keychain
          echo "Certificate imported — verifying:"
          security find-identity -v -p codesigning build.keychain

      - name: Install Provisioning Profile
        run: |
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i profile.mobileprovision | plutil -extract UUID raw -)
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision
          echo "PROFILE_UUID=${UUID}" >> $GITHUB_ENV
          echo "Provisioning profile installed: ${UUID}"

      - name: Setup App Store Connect API Key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_API_PRIVATE_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_API_KEY_ID }}.p8

      - name: Build & Archive
        working-directory: tileescape-cap/ios/App
        run: |
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/TileEscape.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ env.PROFILE_UUID }}" \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            OTHER_CODE_SIGN_FLAGS="--keychain build.keychain"

      - name: Export IPA
        run: |
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>VM337XCL53</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.frameweavestudio.tileescape</key>
              <string>TileEscape AppStore</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/TileEscape.xcarchive \
            -exportPath $RUNNER_TEMP/TileEscape-IPA \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_API_ISSUER_ID }}

      - name: Upload to App Store Connect
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/TileEscape-IPA/App.ipa" \
            --apiKey ${{ secrets.APP_STORE_API_KEY_ID }} \
            --apiIssuer ${{ secrets.APP_STORE_API_ISSUER_ID }} \
            --apiKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_API_KEY_ID }}.p8

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: TileEscape-IPA
          path: ${{ runner.temp }}/TileEscape-IPA/*.ipa
