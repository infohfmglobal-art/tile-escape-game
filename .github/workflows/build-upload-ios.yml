      - name: Import Distribution Certificate
        run: |
          echo "${{ secrets.DISTRIBUTION_CERTIFICATE_P12 }}" | tr -d '[:space:]' | base64 --decode > distribution_raw.p12
          echo "P12 raw size: $(wc -c < distribution_raw.p12) bytes"
          openssl pkcs12 -in distribution_raw.p12 -passin pass: -out /tmp/dist_pem.pem -nodes 2>/dev/null || \
          openssl pkcs12 -in distribution_raw.p12 -passin pass:Tile2024 -out /tmp/dist_pem.pem -nodes
          openssl pkcs12 -export -in /tmp/dist_pem.pem -out distribution.p12 -passout pass:BuildTemp \
            -keypbe PBE-SHA1-3DES -certpbe PBE-SHA1-3DES -macalg sha1
          echo "P12 converted size: $(wc -c < distribution.p12) bytes"
          security create-keychain -p "temp_password" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temp_password" build.keychain
          security import distribution.p12 -k build.keychain -P "BuildTemp" -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "temp_password" build.keychain
          security list-keychain -d user -s build.keychain login.keychain
          echo "Certificate imported — verifying:"
          security find-identity -v -p codesigning build.keychain
